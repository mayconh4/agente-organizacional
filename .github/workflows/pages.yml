name: Atualizar painel SalesOps

# Gera os dados do painel (docs/report.json) e faz commit na main.
# A publicacao e feita pelo GitHub Pages servindo a pasta /docs da branch main
# (Settings -> Pages -> Deploy from a branch -> main -> /docs).
on:
  schedule:
    - cron: "0 8 * * *"   # todo dia as 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Gerar dados do painel
        env:
          SALESOPS_CLIENT: ${{ vars.SALESOPS_CLIENT }}
          SALESOPS_CHANNELS: ${{ vars.SALESOPS_CHANNELS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SALESOPS_MODEL: ${{ vars.SALESOPS_MODEL }}
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          AMAZON_LWA_CLIENT_ID: ${{ secrets.AMAZON_LWA_CLIENT_ID }}
          AMAZON_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
        run: python run.py build-web
      - name: Commit do report.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/report.json
          if git diff --staged --quiet; then
            echo "Sem alteracoes no painel."
          else
            git commit -m "Atualiza dados do painel"
            git push
          fi
