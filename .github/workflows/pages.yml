name: Publicar painel SalesOps

# Gera os dados do painel com o agente e publica em GitHub Pages.
# - Sem credenciais (secrets): publica com dados de exemplo.
# - Com credenciais: publica com dados reais dos marketplaces + diagnóstico do Claude.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"   # todo dia às 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Gerar dados do painel
        env:
          SALESOPS_CLIENT: ${{ vars.SALESOPS_CLIENT }}
          SALESOPS_CHANNELS: ${{ vars.SALESOPS_CHANNELS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SALESOPS_MODEL: ${{ vars.SALESOPS_MODEL }}
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          AMAZON_LWA_CLIENT_ID: ${{ secrets.AMAZON_LWA_CLIENT_ID }}
          AMAZON_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
        run: python run.py build-web

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
